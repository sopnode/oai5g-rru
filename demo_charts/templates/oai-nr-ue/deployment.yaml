apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  labels:
    app: oai-nr-ue
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/name: oai-nr-ue
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oai-nr-ue
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: oai-nr-ue
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/name: oai-nr-ue
      {{- if .Values.multus.enabled }}
      annotations:
        k8s.v1.cni.cncf.io/networks: oai-nr-ue-net1
      {{- end }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{ toYaml .Values.imagePullSecrets | indent 8 }}
      {{- end }}
      {{- if .Values.global }}{{ if .Values.global.waitForRadio }}
      initContainers:
        - name: init
          image: docker.io/oaisoftwarealliance/oai-tcpdump-init:alpine-3.20
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - until ping -c 1  {{ .Values.config.rfSimServer }}; do echo waiting for oai-du to start; sleep 1; done
      {{- end }}{{ end }}
      containers:
        - name: nr-ue
          image: "{{ .Values.nfimage.repository }}:{{ .Values.nfimage.version }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          {{- if eq .Values.config.radio "vrtsim" }}
          hostIPC: true
          {{- end }}
          volumeMounts:
            - mountPath: /opt/oai-nr-ue/etc
              name: configuration
            - name: dev-net-tun
              mountPath: /dev/net/tun
            {{- if eq .Values.config.radio "b2xx" }}
            - mountPath: /dev/bus/usb/
              name: radio
            {{- end }}
            {{- if eq .Values.config.radio "vrtsim" }}
            - name: shared-data
              mountPath: /tmp
            {{- end }}
          {{- if .Values.resources.define }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.nf.memory | quote }}
              cpu: {{ .Values.resources.requests.nf.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.nf.memory | quote }}
              cpu: {{ .Values.resources.limits.nf.cpu | quote }}
          {{- end }}
          {{- if .Values.start.nrue }}
          command: [ "/bin/bash", "-c" ]
          args:
            - RFSIM_IP_ADDRESS=$(getent hosts $RFSIM_HOST | awk '{print $1}');
              RFSIM_IP_ADDRESS=$(if [[ $RFSIM_IP_ADDRESS ]]; then echo $RFSIM_IP_ADDRESS; else echo $RFSIM_HOST;fi);
              {{- if eq .Values.config.radio "b2xx" }}
                /opt/oai-gnb/bin/uhd_images_downloader.py -t b2xx;
              {{- else if eq .Values.config.radio "n3xx" }}
                /opt/oai-gnb/bin/uhd_images_downloader.py -t n3xx;
              {{- else if eq .Values.config.radio "x3xx" }}
                /opt/oai-gnb/bin/uhd_images_downloader.py -t x3xx;
              {{- end }}
              {{- if eq .Values.config.radio "rfsim" }}
                exec /opt/oai-nr-ue/bin/nr-uesoftmodem -O /opt/oai-nr-ue/etc/nr-ue.conf $USE_ADDITIONAL_OPTIONS --rfsimulator.serveraddr $RFSIM_IP_ADDRESS;
              {{- else }}
                exec /opt/oai-nr-ue/bin/nr-uesoftmodem -O /opt/oai-nr-ue/etc/nr-ue.conf $USE_ADDITIONAL_OPTIONS;
              {{- end }}
          {{- else }}
          command:
            - /bin/sleep
            - infinity
          {{- end }}
          env:
            - name: TZ
              value: {{ .Values.config.timeZone | quote }}
            - name: USE_ADDITIONAL_OPTIONS
              value: {{ .Values.config.useAdditionalOptions | quote }}
            - name: RFSIM_HOST
              value: {{ .Values.config.rfSimServer }}
            - name: OAI_GDBSTACKS
              value: "{{ .Values.config.gdbstack }}"
            {{- if eq .Values.config.radio "b2xx" }}
            - name: USE_B2XX
              value: true
            {{- end }}
            {{- if eq .Values.config.radio "x3xx" }}
            - name: USE_X3XX
              value: true
            {{- end }}
            {{- if eq .Values.config.radio "n3xx" }}
            - name: USE_N3XX
              value: true
            {{- end }}
        {{- if .Values.includeTcpDumpContainer }}
        - name: tcpdump
          image: "{{ .Values.tcpdumpimage.repository }}:{{ .Values.tcpdumpimage.version }}"
          imagePullPolicy: {{ .Values.tcpdumpimage.pullPolicy }}
          {{- if .Values.resources.define }}
          resources:
            requests:
              memory: {{ .Values.resources.requests.tcpdump.memory | quote }}
              cpu: {{ .Values.resources.requests.tcpdump.cpu | quote }}
            limits:
              memory: {{ .Values.resources.limits.tcpdump.memory | quote }}
              cpu: {{ .Values.resources.limits.tcpdump.cpu | quote }}
          {{- end }}
          securityContext:
             capabilities:
                add:
                  - NET_ADMIN
                  - NET_RAW
                drop:
                  - ALL
          {{- if .Values.start.tcpdump }}
          command:
            - /bin/sh
            - -c
            - /usr/bin/tcpdump -i any -w /tmp/pcap/{{ .Chart.Name }}_`date +%Y-%m-%d_%H_%M-%S-%Z`.pcap
          {{- else }}
          command:
            - /bin/sleep
            - infinity
          {{- end }}
        {{- end }}
      volumes:
        - configMap:
            name: {{ .Chart.Name }}-configmap
          name: configuration
        - name: dev-net-tun
          hostPath:
            path: /dev/net/tun
        {{- if eq .Values.config.radio "b2xx" }}
        - name: radio
          hostPath:
            path: /dev/bus/usb/
        {{- end }}
        {{- if eq .Values.config.radio "vrtsim" }}
        - name: shared-data
          persistentVolumeClaim:
            claimName: shared-pvc
        {{- end }}
      dnsPolicy: ClusterFirst
      restartPolicy: Always
      serviceAccountName: {{ .Chart.Name }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- if .Values.nodeSelector }}
      nodeSelector:
         {{- toYaml .Values.nodeSelector | nindent 12 }}
      {{- end }}
      {{- if .Values.nodeName }}
      nodeName: {{ .Values.nodeName }}
      {{- end }}
