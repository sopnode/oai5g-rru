name: GitHub Actions Demo
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀
on: 
  workflow_dispatch:
  push:
    branches:
      - '202*.w*'
jobs:
  Explore-GitHub-Actions:
    runs-on: self-hosted
    env: 
      WORK: "/home/github-runner/actions-runner/_work"
      OAI5G: "/home/github-runner/actions-runner/_work/test-oai5g-rru"
    steps:
      - name: Retrieve the prepare-demo-oai.sh script to set up the oai5g-rru demo script
        run: |
          echo "retrieve current k8s cluster configuration"
          /usr/local/bin/k8sgetconfig
          echo "retrieve current branch name"
          BRANCH="${{ github.ref }}" 
          BRANCH=$(basename $BRANCH)
          echo "recreate empty directory test-oai5g-rru "
          rm -rf $OAI5G; mkdir $OAI5G
          cd $OAI5G       
          echo "retrieve local run.sh script"
          cp $WORK/local-scripts/run.sh $OAI5G/
          echo "Check/book R2lab slice"
          $OAI5G/run.sh get-slice
          echo "Switch on jaguar and panther RRUs"
          $OAI5G/run.sh init-rru jaguar
          $OAI5G/run.sh init-rru panther
          echo "UE setup"
          $OAI5G/run.sh init-ue          
          echo "retrieve prepare-demo-oai.sh script"
          wget https://raw.githubusercontent.com/sopnode/oai5g-rru/$BRANCH/testing/prepare-demo-oai.sh -O $OAI5G/prepare-demo-oai.sh
          chmod a+x $OAI5G/prepare-demo-oai.sh
          echo "configure oai5g-rru demo, branch $BRANCH for RRU=jaguar"
          $OAI5G/prepare-demo-oai.sh -a -B $BRANCH -R jaguar
	  echo "Sleep 60s to ensure RUs are operational"; sleep 60
          echo "Run the oai5g-rru demo with jaguar RRU"
          $OAI5G/demo-oai.sh start
          echo "Sleep 10s"; sleep 10
          echo "Trigger UE cx"
          $OAI5G/run.sh start-ue || true
          echo "Sleep 1mn"; sleep 60
          echo "Run IPERF Tests..."
          $OAI5G/run.sh run-iperf || true
          echo "Now disconnect UE"
          $OAI5G/run.sh stop-ue || true
          echo "Abort the oai5g-rru demo with jaguar"
          $OAI5G/demo-oai.sh stop
          echo "configure oai5g-rru demo script with the panther RRU"
          $OAI5G/prepare-demo-oai.sh -a -B $BRANCH -R panther
          echo "Run the oai5g-rru demo"
          $OAI5G/demo-oai.sh start
          echo "Sleep 10s"; sleep 10
          echo "Trigger UE cx"
          $OAI5G/run.sh start-ue || true
          echo "Sleep 1mn"; sleep 60
          echo "Run IPERF Tests..."
          $OAI5G/run.sh run-iperf || true
          echo "Now disconnect UE"
          $OAI5G/run.sh stop-ue || true
          echo "Abort the oai5g-rru demo with panther"
          $OAI5G/demo-oai.sh stop
          echo "Test finished, free up R2lab resources"
          $OAI5G/run.sh all-off
      - run: echo "🍏 This job's status is ${{ job.status }}."
      
